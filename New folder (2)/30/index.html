<!DOCTYPE html>
<html style="height:100%;">
<head>
    <title>Web Page Layout 4</title>
</head>

<body style="height:100%; margin:0;">

<table border="1" width="100%" height="100%">

    <!-- Row 1 -->
    <tr height="10%">
        <td width="20%" rowspan="3" valign="top">
            Navigation
        </td>

        <td colspan="2" align="center">
            Header
        </td>
    </tr>

    <!-- Row 2 -->
    <tr height="5%">
        <td align="left">
            Student Number: 92837293
        </td>

        <td align="right">
            All Students
        </td>
    </tr>

    <!-- Row 3 -->
    <tr height="55%">

        <!-- Main Left Box -->
        <td width="55%" valign="top" align="center">
            [Main Left Box]
        </td>

        <!-- Right Side Boxes -->
        <td width="25%">
            <table border="1" width="100%" height="100%">
                <tr height="50%">
                    <td align="center">
                        [Top Right Box]
                    </td>
                </tr>

                <tr height="50%">
                    <td align="center">
                        [Bottom Right Box]
                    </td>
                </tr>
            </table>
        </td>

    </tr>

    <!-- Bottom Full Width Box -->
    <tr height="30%">
        <td colspan="2" align="center">
            [Bottom Full Width Box]
        </td>
    </tr>

</table>

</body>
</html>
