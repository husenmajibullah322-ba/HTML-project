<!DOCTYPE html>
<html style="height:100%;">

    <title>Web Page Layout 3</title>
</head>

<body style="height:100%; margin:0;">

    <tr height="15%">
        <td colspan="3" align="center">
            Header
        </td>
    </tr>

    <!-- Main Content Area -->
    <tr height="70%">

        <!-- Left Column -->
        <td width="20%">

            <table border="1" width="100%" height="100%">
                <tr height="50%">
                    <td align="center">Menu</td>
                </tr>

                <tr height="50%">
                    <td align="center">Ad2</td>
                </tr>
            </table>

        </td>

        <!-- Center Column -->
        <td width="60%" align="center">
            Main
        </td>

        <!-- Right Column -->
        <td width="20%" align="center">
            Ad1
        </td>

    </tr>

    <!-- Footer -->
    <tr height="15%">
        <td colspan="3" align="center">
            Footer
        </td>
    </tr>

</table>

</body>
</html>
